default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

  host: <%= ENV.fetch("DB_HOST")%>
  port: 5432
  username: postgres
  password: <%= ENV.fetch("DB_PASSWORD")%>

development:
  <<: *default
  database: tg_rails_crm_development

test:
  <<: *default
  database: tg_rails_crm_test
